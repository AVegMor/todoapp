apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todoapp
  namespace: todoapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: todoapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todoapp
                port:
                  number: 80
