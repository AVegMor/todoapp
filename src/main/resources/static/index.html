<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="app-title">
      <header class="header">
        <div>
          <p class="eyebrow">Gestor de tareas</p>
          <h1 id="app-title">TODO App</h1>
          <p class="subtitle">Organiza tu dia con una interfaz clara y rapida.</p>
        </div>
        <button id="theme-toggle" type="button" class="ghost-btn" aria-label="Cambiar tema">🌙</button>
      </header>

      <form id="task-form" class="task-form">
        <label class="sr-only" for="title">Nueva tarea</label>
        <input id="title" type="text" placeholder="Escribe una tarea..." required maxlength="255">
        <button type="submit">Crear</button>
      </form>

      <p id="task-counter" class="counter" aria-live="polite"></p>
      <ul id="task-list" class="task-list"></ul>
      <p id="empty-state" class="empty-state" hidden>No hay tareas todavia. Crea la primera para empezar.</p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
